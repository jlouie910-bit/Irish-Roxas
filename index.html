<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 18th Birthday! ✨</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Georgia', 'Segoe UI', serif;
            background: linear-gradient(135deg, #0b132b 0%, #1c2541 40%, #3a0ca3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .gold-dust {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp 7s linear infinite;
            opacity: 0.7;
        }

        /* --- CARD STYLE --- */
        .card {
            background: rgba(255, 255, 255, 0.92);
            padding: 45px 40px;
            border-radius: 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(212, 175, 55, 0.2);
            text-align: center;
            max-width: 460px;
            width: 90%;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 2px solid rgba(212, 175, 55, 0.4);
        }

        .card h1 {
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .card h2 {
            color: #4a0e4e;
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* --- THE COUNTDOWN LAYOUT --- */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .countdown-box {
            background: linear-gradient(135deg, #4a0e4e, #310834);
            color: #fffdf6;
            padding: 12px 8px;
            border-radius: 14px;
            min-width: 72px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .countdown-number {
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Segoe UI', sans-serif;
            color: #d4af37;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
        }

        .countdown-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 4px;
        }

        .status-msg {
            font-size: 0.9rem;
            color: #555;
            font-style: italic;
            margin-bottom: 20px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- ACTION BUTTONS --- */
        .btn {
            font-family: 'Segoe UI', sans-serif;
            color: white;
            border: none;
            padding: 15px 36px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .wish-btn {
            background: linear-gradient(45deg, #d4af37, #aa7c11);
            box-shadow: 0 5px 25px rgba(212, 175, 55, 0.4);
        }

        .wish-btn:hover:not(:disabled) {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 30px rgba(212, 175, 55, 0.7);
        }

        .wish-btn:disabled {
            background: linear-gradient(45deg, #7f8c8d, #95a5a6);
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* --- ENVELOPE INTERACTION --- */
        .envelope-wrapper {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.5s ease;
            width: 100%;
        }

        .envelope-container {
            position: relative;
            width: 360px;
            height: 250px;
            cursor: pointer;
            perspective: 1000px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #4a0e4e;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 180px solid transparent;
            border-right: 180px solid transparent;
            border-top: 135px solid #310834;
            transform-origin: top;
            transition: transform 0.4s ease 0.2s;
            z-index: 3;
        }

        .pocket {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 0;
            border-left: 180px solid #5c1361;
            border-right: 180px solid #5c1361;
            border-bottom: 125px solid #5c1361;
            border-radius: 0 0 12px 12px;
            z-index: 2;
        }

        .letter {
            position: absolute;
            top: 10px;
            left: 15px;
            width: 330px;
            height: 220px;
            background: #fffdf6;
            border-radius: 8px;
            padding: 25px 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            transition: transform 0.6s ease;
            z-index: 1;
            text-align: center;
            overflow-y: auto;
            border: 1px solid #e2d19e;
        }

        .letter h3 {
            color: #aa7c11;
            margin-bottom: 12px;
            font-size: 1.4rem;
        }

        .letter p {
            color: #333;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(212, 175, 55, 0.5);
            color: #e2d19e;
            backdrop-filter: blur(5px);
            padding: 10px 26px;
            font-size: 0.95rem;
            margin-top: 30px;
        }

        .back-btn:hover {
            background: rgba(212, 175, 55, 0.2);
            color: #fff;
        }

        .envelope-container.open .flap {
            transform: rotateX(180deg);
            z-index: 0;
            transition: transform 0.4s ease, z-index 0.1s ease 0.2s;
        }

        .envelope-container.open .letter {
            transform: translateY(-140px);
            z-index: 4;
            height: 290px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) translateX(0) scale(0.3); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) translateX(30px) scale(1); opacity: 0; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Ambient Floating Gold Particle Script -->
    <script>
        const goldShades = ['#d4af37', '#f3e5ab', '#ffdf7a', '#aa7c11', '#ffffff'];
        for (let i = 0; i < 40; i++) {
            let dust = document.createElement('div');
            dust.classList.add('gold-dust');
            dust.style.top = Math.random() * 100 + 'vh';
            dust.style.left = Math.random() * 100 + 'vw';
            let size = Math.random() * 10 + 2;
            dust.style.width = dust.style.height = size + 'px';
            dust.style.backgroundColor = goldShades[Math.floor(Math.random() * goldShades.length)];
            dust.style.boxShadow = `0 0 ${size}px ${dust.style.backgroundColor}`;
            dust.style.animationDuration = Math.random() * 5 + 5 + 's';
            dust.style.animationDelay = Math.random() * 4 + 's';
            document.body.appendChild(dust);
        }
    </script>

    <!-- MAIN INTERFACE PAGE -->

        <h1>Happy 18th Birthday! 🎉</h1>
        <h2>Welcome to Chapter 18 ✨</h2>

                <div class="countdown-number" id="hours">00</div>
                <div class="countdown-label">Hrs</div>
            </div>
